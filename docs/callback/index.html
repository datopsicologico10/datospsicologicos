<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TikTok Auth Callback</title></head>
<body style="font-family:monospace;padding:40px;background:#111;color:#0f0">
<h2>TikTok Authorization</h2>
<p id="msg">Procesando...</p>
<pre id="code"></pre>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  if (code) {
    document.getElementById('msg').innerText = 'Copia este código:';
    document.getElementById('code').innerText = code;
  } else if (error) {
    document.getElementById('msg').innerText = 'Error: ' + error;
  }
</script>
</body>
</html>
